---
- name: Ensure ClickHouse paths exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: "{{ clickhouse_uid }}"
    group: "{{ clickhouse_gid }}"
  with_items:
    - "{{ clickhouse_base_path }}"
    - "{{ clickhouse_backups_path }}"
    - "{{ clickhouse_bin_path }}"
    - "{{ clickhouse_config_path }}"
    - "{{ clickhouse_data_path }}"

- name: Ensure ClickHouse support files installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/{{ item }}.j2"
    dest: "{{ clickhouse_base_path }}/{{ item }}"
    mode: "0640"
    owner: "{{ clickhouse_uid }}"
    group: "{{ clickhouse_gid }}"
  with_items:
    - env
  register: clickhouse_support_files_result

- name: Ensure ClickHouse configuration file installed
  ansible.builtin.copy:
    content: "{{ clickhouse_config | to_nice_yaml(indent=2, width=999999) }}"
    dest: "{{ clickhouse_config_path }}/config.yaml"
    mode: "0640"
    owner: "{{ clickhouse_uid }}"
    group: "{{ clickhouse_gid }}"
  register: clickhouse_config_file_result

- name: Ensure ClickHouse scripts created
  ansible.builtin.template:
    src: "{{ role_path }}/templates/bin/{{ item }}.j2"
    dest: "{{ clickhouse_bin_path }}/{{ item }}"
    mode: "0750"
  with_items:
    - cli
  register: clickhouse_scripts_result

- name: Ensure ClickHouse container image is pulled via community.docker.docker_image
  when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
  community.docker.docker_image:
    name: "{{ clickhouse_container_image }}"
    source: "{{ 'pull' if ansible_version.major > 2 or ansible_version.minor > 7 else omit }}"
    force_source: "{{ clickhouse_container_image_force_pull if ansible_version.major > 2 or ansible_version.minor >= 8 else omit }}"
    force: "{{ omit if ansible_version.major > 2 or ansible_version.minor >= 8 else clickhouse_container_image_force_pull }}"
  register: clickhouse_container_image_pull_result
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: clickhouse_container_image_pull_result is not failed

- name: Ensure ClickHouse container image is pulled via ansible.builtin.command
  when: devture_systemd_docker_base_container_image_pull_method == 'command'
  ansible.builtin.command:
    cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ clickhouse_container_image }}"
  register: clickhouse_container_image_pull_result
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: clickhouse_container_image_pull_result is not failed
  changed_when: "'Downloaded newer image' in clickhouse_container_image_pull_result.stdout"

- name: Ensure ClickHouse container network is created via community.docker.docker_network
  when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
  community.docker.docker_network:
    enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
    name: "{{ clickhouse_container_network }}"
    driver: bridge
    driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"
  register: clickhouse_network_creation_result

- name: Ensure ClickHouse container network is created via ansible.builtin.command
  when: devture_systemd_docker_base_container_network_creation_method == 'command'
  ansible.builtin.command:
    cmd: >-
      {{ devture_systemd_docker_base_host_command_docker }} network create
      {% if devture_systemd_docker_base_ipv6_enabled %}--ipv6{% endif %}
      {{ devture_systemd_docker_base_container_networks_driver_options_string }}
      {{ clickhouse_container_network }}
  register: clickhouse_network_creation_result
  changed_when: clickhouse_network_creation_result.rc == 0
  failed_when: clickhouse_network_creation_result.rc != 0 and 'already exists' not in clickhouse_network_creation_result.stderr

- name: Ensure ClickHouse systemd service is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/clickhouse.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ clickhouse_identifier }}.service"
    mode: "0644"
  register: clickhouse_systemd_service_result

- name: Ensure managed ClickHouse databases prepared
  ansible.builtin.include_tasks:
    file: "{{ role_path }}/tasks/util/prepare_managed_databases.yml"
    apply:
      tags:
        - always
  when: "clickhouse_managed_databases | length > 0"
  register: clickhouse_databases_preparation_result

- name: Determine whether ClickHouse needs a restart
  ansible.builtin.set_fact:
    clickhouse_restart_necessary: >-
      {{
        clickhouse_support_files_result.changed | default(false)
        or clickhouse_config_file_result.changed | default(false)
        or clickhouse_scripts_result.changed | default(false)
        or clickhouse_systemd_service_result.changed | default(false)
        or clickhouse_container_image_pull_result.changed | default(false)
        or clickhouse_databases_preparation_result.changed | default(false)
      }}
